      - name: Set up SSH (with debug)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          echo "Home dir: $HOME"
          ls -la $HOME
          mkdir -p ~/.ssh || echo "mkdir failed"
          echo "After mkdir:"
          ls -la ~/.ssh || true
          echo "$SSH_PRIVATE_KEY" | wc -l  # сколько строк в ключе
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ env.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Set up SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ env.VPS_HOST }} >> ~/.ssh/known_hosts  # Добавьте хост в known_hosts
      - name: Connect and deploy
        run: |
          ssh ${{ env.VPS_USERNAME }}@${{ env.VPS_HOST }} 'cd ${{ env.DIR }} && git fetch --all && git reset --hard ${{ env.GIT_BRANCH }}'
      - name: composer install
        run: |
          ssh ${{ env.VPS_USERNAME }}@${{ env.VPS_HOST }} 'docker exec ${{ env.DOCKER_CONTAINER }} composer install --no-dev --optimize-autoloader'
